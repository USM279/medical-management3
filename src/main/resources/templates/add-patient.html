<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${patient.id != null ? 'Hastayı Düzenle' : 'Yeni Hasta Ekle'}"></title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0" th:text="${patient.id != null ? 'Hasta Bilgilerini Güncelle' : 'Hasta Kaydı'}"></h4>
                </div>
                <div class="card-body">
                    <form th:action="${patient.id != null ? '/patients/edit/' + patient.id : '/patients/add'}"
                          th:object="${patient}" method="post">

                        <input type="hidden" th:field="*{id}">

                        <div class="mb-3">
                            <label class="form-label">Ad Soyad</label>
                            <input type="text" th:field="*{name}" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Şikayetler</label>
                            <textarea th:field="*{complaints}" class="form-control" rows="3"></textarea>
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-success" th:text="${patient.id != null ? 'Güncelle' : 'Kaydet'}"></button>
                            <a href="/patients" class="btn btn-outline-secondary">İptal</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
