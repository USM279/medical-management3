<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Doktor Listesi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Doktor Yönetimi</h2>
        <div>
            <a href="/" class="btn btn-secondary me-2">Geri Dön</a>
            <a sec:authorize="hasRole('ADMIN')" href="/doctors/add" class="btn btn-primary">Yeni Doktor Ekle</a>
        </div>
    </div>

    <div class="card shadow">
        <div class="card-body">
            <table class="table table-hover align-middle">
                <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Fotoğraf</th>
                    <th>İsim</th>
                    <th>Uzmanlık</th>
                    <th sec:authorize="hasRole('ADMIN')">İşlemler</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="doctor : ${doctors}">
                    <td th:text="${doctor.id}"></td>
                    <td>
                        <img th:if="${doctor.imagePath}" th:src="@{${doctor.imagePath}}"
                             width="55" height="55" style="object-fit: cover;" class="rounded-circle border">
                        <span th:unless="${doctor.imagePath}" class="text-muted small">Yok</span>
                    </td>
                    <td th:text="${doctor.name}"></td>
                    <td th:text="${doctor.specialty}"></td>
                    <td sec:authorize="hasRole('ADMIN')">
                        <a th:href="@{/doctors/edit/{id}(id=${doctor.id})}" class="btn btn-warning btn-sm">Düzenle</a>
                        <a th:href="@{/doctors/delete/{id}(id=${doctor.id})}"
                           class="btn btn-danger btn-sm"
                           onclick="return confirm('Silmek istediğine emin misin?')">Sil</a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
