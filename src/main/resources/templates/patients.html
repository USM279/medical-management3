<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Hasta Listesi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Hasta Yönetimi</h2>
        <div>
            <a href="/" class="btn btn-secondary me-2">Geri Dön</a>
            <a href="/patients/add" class="btn btn-primary">Yeni Hasta Ekle</a>
        </div>
    </div>
    <div class="card shadow">
        <div class="card-body">
            <table class="table table-hover align-middle">
                <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Hasta Adı</th>
                    <th>Şikayetler</th>
                    <th>İşlemler</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="p : ${patients}">
                    <td th:text="${p.id}"></td>
                    <td th:text="${p.name}"></td>
                    <td th:text="${p.complaints}"></td>
                    <td>
                        <a th:href="@{/patients/edit/{id}(id=${p.id})}" class="btn btn-warning btn-sm">Düzenle</a>
                        <a th:href="@{/patients/delete/{id}(id=${p.id})}"
                           class="btn btn-danger btn-sm"
                           onclick="return confirm('Silmek istediğine emin misin?')">Sil</a>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(patients)}">
                    <td colspan="4" class="text-center text-muted">Henüz kayıtlı bir hasta bulunmuyor.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
