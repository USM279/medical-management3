<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${doctor.id != null ? 'Doktoru Düzenle' : 'Yeni Doktor Ekle'}"></title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0" th:text="${doctor.id != null ? 'Doktor Güncelle' : 'Doktor Kaydı'}"></h4>
                </div>
                <div class="card-body">
                    <form th:action="${doctor.id != null ? '/doctors/edit/' + doctor.id : '/doctors/add'}"
                          th:object="${doctor}" method="post" enctype="multipart/form-data">

                        <input type="hidden" th:field="*{id}">

                        <div class="mb-3">
                            <label class="form-label">Ad Soyad</label>
                            <input type="text" th:field="*{name}" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Uzmanlık Alanı</label>
                            <input type="text" th:field="*{specialty}" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Doktor Fotoğrafı</label>
                            <input type="file" name="image" class="form-control" accept="image/*">
                            <div th:if="${doctor.imagePath}" class="mt-2">
                                <small class="text-muted">Mevcut fotoğraf korunacak (Değiştirmek için yeni seçin)</small>
                            </div>
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-success" th:text="${doctor.id != null ? 'Güncelle' : 'Kaydet'}"></button>
                            <a href="/doctors" class="btn btn-outline-secondary">İptal</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
