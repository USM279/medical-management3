<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Randevu Listesi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Randevu Yönetimi</h2>
        <div>
            <a href="/" class="btn btn-secondary me-2">Geri Dön</a>
            <a href="/appointments/add" class="btn btn-primary">Yeni Randevu Oluştur</a>
        </div>
    </div>

    <div class="card shadow">
        <div class="card-body">
            <table class="table table-striped align-middle">
                <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Doktor Adı</th>
                    <th>Hasta Adı</th>
                    <th>Randevu Tarihi</th>
                    <th>İşlemler</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="app : ${appointments}">
                    <td th:text="${app.id}"></td>
                    <td th:text="${app.doctorName}"></td>
                    <td th:text="${app.patientName}"></td>
                    <td th:text="${#temporals.format(app.appointmentDate, 'dd-MM-yyyy HH:mm')}"></td>
                    <td>
                        <a th:href="@{/appointments/delete/{id}(id=${app.id})}"
                           class="btn btn-danger btn-sm"
                           onclick="return confirm('Bu randevuyu iptal etmek istediğinize emin misiniz?')">İptal Et</a>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(appointments)}">
                    <td colspan="5" class="text-center text-muted">Henüz planlanmış bir randevu yok.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
